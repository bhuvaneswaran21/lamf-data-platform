name: lamf

x-aws-env: &aws-env
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-admin}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-password123}
  AWS_REGION: ${AWS_REGION:-us-east-1}

services:

  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    profiles: [core]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password123}
    ports: ["9000:9000", "9001:9001"]   
    volumes: ["minio-data:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5


  mc:
    image: minio/mc:RELEASE.2024-09-16T17-43-14Z
    profiles: [core]
    depends_on:
      minio: {condition: service_healthy}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-admin} ${MINIO_ROOT_PASSWORD:-password123} &&
      mc mb -p local/${WAREHOUSE_BUCKET:-warehouse} &&
      mc anonymous set public local/${WAREHOUSE_BUCKET:-warehouse} &&
      echo 'bucket ready' "


  nessie:
    image: ghcr.io/projectnessie/nessie:0.99.0
    profiles: [core]
    environment:
      nessie.version.store.type: IN_MEMORY   
      nessie.catalog.default-warehouse: warehouse
    ports: ["19120:19120"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19120/api/v2/config"]
      interval: 10s
      timeout: 5s
      retries: 6


  postgres:
    image: postgres:16
    profiles: [core]
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lamf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lamf}
      POSTGRES_DB: ${POSTGRES_DB:-lamf}
    ports: ["5432:5432"]
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
      - ./data:/data:ro
      - ./ingestion/debezium:/debezium:ro  
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lamf}"]
      interval: 10s
      timeout: 5s
      retries: 5


  spark:
    build: ./infra/spark
    image: lamf/spark-iceberg:local
    profiles: [core]
    depends_on:
      minio: {condition: service_healthy}
      nessie: {condition: service_healthy}
    environment:
      <<: *aws-env
      NESSIE_URI: ${NESSIE_URI_V1:-http://nessie:19120/api/v1}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      WAREHOUSE: s3a://${WAREHOUSE_BUCKET:-warehouse}/
    ports: ["8081:8080", "4040:4040"]    
    volumes:
      - ./transform/spark:/opt/jobs/spark:ro
      - ./sql:/opt/jobs/sql:ro
      - ./data:/opt/jobs/data
      - ./quality:/opt/jobs/quality:ro

    command: ["tail", "-f", "/dev/null"]

  trino:
    image: trinodb/trino:450
    profiles: [core]
    depends_on:
      nessie: {condition: service_healthy}
      minio: {condition: service_healthy}
    ports: ["8080:8080"]
    volumes:
      - ./infra/trino/catalog:/etc/trino/catalog:ro


  kafka:
    image: bitnami/kafka:3.7
    profiles: [stream]
    ports: ["29092:29092"]
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes: ["kafka-data:/bitnami/kafka"]

  connect:
    image: debezium/connect:2.7.3.Final
    profiles: [stream]
    depends_on:
      kafka: {condition: service_started}
    ports: ["8084:8083"]
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: lamf-connect
      CONFIG_STORAGE_TOPIC: _connect_configs
      OFFSET_STORAGE_TOPIC: _connect_offsets
      STATUS_STORAGE_TOPIC: _connect_status
      CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      STATUS_STORAGE_REPLICATION_FACTOR: "1"
    volumes:
      - ./ingestion/debezium:/debezium:ro

  redis:
    image: redis:7-alpine
    profiles: [stream]
    ports: ["6379:6379"]

  flink-jobmanager:
    build: ./infra/flink
    image: lamf/flink:local
    profiles: [stream]
    command: jobmanager
    ports: ["8083:8081"] 
    environment:
      <<: *aws-env
      FLINK_PROPERTIES: "jobmanager.rpc.address: flink-jobmanager"
    volumes:
      - ./streaming/flink:/opt/jobs/flink:ro

  flink-taskmanager:
    image: lamf/flink:local
    profiles: [stream]
    depends_on: [flink-jobmanager]
    command: taskmanager
    environment:
      <<: *aws-env
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
    volumes:
      - ./streaming/flink:/opt/jobs/flink:ro


  airflow:
    build: ./infra/airflow
    image: lamf/airflow:local
    profiles: [orchestration]
    depends_on:
      postgres: {condition: service_healthy}
    environment:
      <<: *aws-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-lamf}:${POSTGRES_PASSWORD:-lamf}@postgres/${POSTGRES_DB:-lamf}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-admin}
    ports: ["8082:8080"]
    volumes:
      - ./orchestration/airflow/dags:/opt/airflow/dags:ro
      - /var/run/docker.sock:/var/run/docker.sock   
    command:
      - bash
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "$${_AIRFLOW_WWW_USER_USERNAME:-admin}" \
          --password "$${_AIRFLOW_WWW_USER_PASSWORD:-admin}" \
          --firstname Admin --lastname User --role Admin \
          --email admin@example.com || true
        airflow scheduler &
        exec airflow webserver


  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: [observability]
    ports: ["9090:9090"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.2.0
    profiles: [observability]
    depends_on: [prometheus]
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: trino-datasource
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

  superset:
    build: ./infra/superset
    image: lamf/superset:local
    profiles: [bi]
    depends_on:
      trino: {condition: service_started}
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-lamf-superset-dev-secret-please-change-0123456789abcdef}
      SUPERSET_LOAD_EXAMPLES: "no"
      TALISMAN_ENABLED: "False"
    ports: ["8088:8088"]
    volumes:
      - superset-home:/app/superset_home
    command:
      - bash
      - -c
      - |
        superset db upgrade
        superset fab create-admin \
          --username "$${ADMIN_USERNAME:-admin}" --password "$${ADMIN_PASSWORD:-admin}" \
          --firstname Admin --lastname User --email admin@example.com || true
        superset init
        exec gunicorn -w 3 -k gthread --threads 4 -b 0.0.0.0:8088 --timeout 120 "superset.app:create_app()"

volumes:
  minio-data:
  pg-data:
  kafka-data:
  grafana-data:
  superset-home:
